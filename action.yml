name: 'Reoclo Run'
description: 'Execute commands on Reoclo managed servers'
branding:
  icon: 'terminal'
  color: 'blue'
inputs:
  api_key:
    description: 'Reoclo automation API key'
    required: true
  server_id:
    description: 'Target server ID'
    required: true
  command:
    description: 'Shell command to execute on the server'
    required: true
  working_directory:
    description: 'Working directory on the server'
    required: false
  env:
    description: 'Environment variables as KEY=VALUE pairs, one per line'
    required: false
  timeout:
    description: 'Timeout in seconds (default 60, max 900)'
    required: false
    default: '60'
  api_url:
    description: 'Reoclo API URL (for self-hosted instances)'
    required: false
    default: 'https://api.reoclo.com'
outputs:
  exit_code:
    description: 'Command exit code'
    value: ${{ steps.run.outputs.exit_code }}
  stdout:
    description: 'Command stdout (truncated to 64KB)'
    value: ${{ steps.run.outputs.stdout }}
  stderr:
    description: 'Command stderr (truncated to 64KB)'
    value: ${{ steps.run.outputs.stderr }}
  operation_id:
    description: 'Reoclo automation operation ID'
    value: ${{ steps.run.outputs.operation_id }}
  duration_ms:
    description: 'Execution duration in milliseconds'
    value: ${{ steps.run.outputs.duration_ms }}
runs:
  using: 'composite'
  steps:
    - name: Ensure reoclo CLI
      shell: bash
      env:
        REOCLO_PIN: v0.44.2
        # SHA-256 of the pinned release's install.sh (stable across releases). The
        # installer then verifies the downloaded binary against SHA256SUMS, so this
        # gives a tamper-evident chain: pinned hash -> installer -> binary.
        REOCLO_INSTALL_SHA256: a1ac3c97e6965078dec9115e14f20a6731ba03b079c92ce81140491a9eff1cce
      run: |
        set -euo pipefail
        want="${REOCLO_PIN#v}"
        if command -v reoclo >/dev/null 2>&1 && [ "$(reoclo --version 2>/dev/null || true)" = "$want" ]; then
          echo "reoclo $want already present"
          exit 0
        fi
        dir="${RUNNER_TEMP:-/tmp}/reoclo-bin"
        mkdir -p "$dir"
        curl -fsSL -o "$dir/install.sh" "https://github.com/reoclo/cli/releases/download/${REOCLO_PIN}/install.sh"
        if command -v sha256sum >/dev/null 2>&1; then
          echo "${REOCLO_INSTALL_SHA256}  ${dir}/install.sh" | sha256sum -c -
        else
          echo "${REOCLO_INSTALL_SHA256}  ${dir}/install.sh" | shasum -a 256 -c -
        fi
        sh "$dir/install.sh" --version "${REOCLO_PIN}" --install-dir "$dir" --no-modify-path
        echo "$dir" >> "$GITHUB_PATH"
    - name: Run command
      id: run
      shell: bash
      env:
        REOCLO_AUTOMATION_KEY: ${{ inputs.api_key }}
        REOCLO_API_URL: ${{ inputs.api_url }}
        IN_SERVER_ID: ${{ inputs.server_id }}
        IN_COMMAND: ${{ inputs.command }}
        IN_CWD: ${{ inputs.working_directory }}
        IN_ENV: ${{ inputs.env }}
        IN_TIMEOUT: ${{ inputs.timeout }}
      run: |
        set -euo pipefail
        args=(exec "$IN_SERVER_ID" --output json)
        if [ -n "$IN_TIMEOUT" ]; then args+=(--timeout "$IN_TIMEOUT"); fi
        if [ -n "$IN_CWD" ]; then args+=(--cwd "$IN_CWD"); fi
        if [ -n "$IN_ENV" ]; then
          while IFS= read -r line; do
            if [ -n "$line" ]; then
              args+=(--env "$line")
            fi
          done <<< "$IN_ENV"
        fi
        args+=(-- "$IN_COMMAND")
        set +e
        out="$(reoclo "${args[@]}")"
        rc=$?
        set -e
        echo "exit_code=$(printf '%s' "$out" | jq -r '.exit_code')" >> "$GITHUB_OUTPUT"
        d="ghaEOF_${RANDOM}_${RANDOM}"
        { echo "stdout<<$d"; printf '%s' "$out" | jq -r '.stdout'; echo "$d"; } >> "$GITHUB_OUTPUT"
        d="ghaEOF_${RANDOM}_${RANDOM}"
        { echo "stderr<<$d"; printf '%s' "$out" | jq -r '.stderr'; echo "$d"; } >> "$GITHUB_OUTPUT"
        echo "operation_id=$(printf '%s' "$out" | jq -r '.operation_id // ""')" >> "$GITHUB_OUTPUT"
        echo "duration_ms=$(printf '%s' "$out" | jq -r '.duration_ms // ""')" >> "$GITHUB_OUTPUT"
        exit $rc
